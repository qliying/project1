global:
  scrape_interval: 15s       # 每15秒采集一次服务器数据
  evaluation_interval: 15s

# 对接Alertmanager告警服务（9093端口）
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# 加载自定义告警规则文件
rule_files:
  - "alert_rules.yml"

# 监控目标：监控本机Node‑Exporter
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'linux_cloud_server'
    static_configs:
      - targets: ['localhost:9100']
